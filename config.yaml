# AutoR configuration 配置文件

paths:
  papers_dir: data/papers # Ingested papers directory 已入库论文目录
  index_db: data/index.db # SQLite index file SQLite 索引文件

# LLM backend LLM 后端配置
# Put api_key in config.local.yaml (gitignored) or use env vars:
# 敏感信息（api_key）放 config.local.yaml（不进 git），或用环境变量：
#   AUTOR_LLM_API_KEY（通用）或按 backend 自动查找对应环境变量：
#   openai-compat: DEEPSEEK_API_KEY / OPENAI_API_KEY
#   anthropic:     ANTHROPIC_API_KEY
#   google:        GOOGLE_API_KEY / GEMINI_API_KEY
llm:
  backend: openai-compat # openai-compat | anthropic | google
  model: deepseek-chat
  base_url: https://api.deepseek.com
  api_key: null # → config.local.yaml
  timeout: 30 # Normal LLM call timeout (sec) 普通调用超时（秒）
  timeout_toc: 120 # enrich-toc timeout enrich-toc 超时
  timeout_clean: 90 # validate_and_clean timeout 结论清洗超时
  concurrency: 32 # Max concurrent LLM calls for enrich (toc/l3) enrich 并发数

# --- Backend presets 后端预设示例 ---
# DeepSeek (default 默认):
#   backend: openai-compat
#   model: deepseek-chat
#   base_url: https://api.deepseek.com
#
# OpenAI:
#   backend: openai-compat
#   model: gpt-4o
#   base_url: https://api.openai.com
#
# Anthropic Claude:
#   backend: anthropic
#   model: claude-sonnet-4-20250514
#   base_url: https://api.anthropic.com
#
# Google Gemini:
#   backend: google
#   model: gemini-2.5-flash
#   base_url: https://generativelanguage.googleapis.com
#
# Local Ollama:
#   backend: openai-compat
#   model: qwen2.5:14b
#   base_url: http://localhost:11434

# Ingest pipeline 数据入库管道
ingest:
  extractor: robust # auto | regex | llm | robust
  mineru_mode: hybrid # local | cloud | hybrid; hybrid runs local + all cloud tokens in parallel
  mineru_endpoint: http://localhost:8000 # Local MinerU API 本地 MinerU API
  mineru_cloud_url: https://mineru.net/api/v4 # Cloud MinerU API 云端 MinerU API
  mineru_api_keys: [] # Sensitive values stay in config.local.yaml or env MINERU_API_KEYS
  mineru_backend_local: pipeline # local backend: pipeline | vlm-auto-engine | vlm-http-client | hybrid-auto-engine | hybrid-http-client
  mineru_model_version_cloud: pipeline # cloud model_version: pipeline | vlm | MinerU-HTML
  mineru_lang: ch # OCR language for local/cloud MinerU 本地/云端 OCR 语言
  mineru_parse_method: auto # auto | txt | ocr
  mineru_enable_formula: true # Enable formula parsing 是否启用公式解析
  mineru_enable_table: true # Enable table parsing 是否启用表格解析
  abstract_llm_mode: verify # off | fallback | verify
  contact_email: null # Crossref polite pool email → config.local.yaml
  s2_api_key: null # Semantic Scholar API key → config.local.yaml or env S2_API_KEY
  ncbi_api_key: null # NCBI E-utilities / PubMed API key → config.local.yaml or env NCBI_API_KEY
  mineru_cloud_batch_size: 20 # Cloud batch size per token request 每个 token 每批文件数上限
  mineru_cloud_workers_per_token: 1 # Reserved; effective cloud parallelism is one source per token
  mineru_cloud_max_inflight_batches_per_token: 1
  mineru_cloud_max_files_per_token_per_min: 35
  mineru_cloud_max_result_queries_per_token_per_min: 600
  mineru_cloud_poll_interval_seconds: 10
  mineru_cloud_backoff_on_429_seconds: 60
  mineru_cloud_backoff_max_seconds: 600
  chunk_page_limit: 100 # Auto-split PDFs exceeding this page count 超长 PDF 自动切分页数阈值

search:
  top_k: 20 # Node-level FTS5 search default results 节点级证据检索默认返回条数

# Logging & metrics 日志与指标
logging:
  level: INFO
  file: data/autor.log
  max_bytes: 10000000 # 10 MB, rotate on overflow 超出轮转
  backup_count: 3
  metrics_db: data/metrics.db

# Plot generation 绘图（GPT Image 2）
plot:
  host: https://grsai.dakka.com.cn # Relay host 中转服务地址
  api_key: null # → config.local.yaml or env AUTOR_PLOT_API_KEY
  model: gpt-image-2 # default drawing model 默认绘图模型
  aspect_ratio: auto # auto | 1:1 | 16:9 | 9:16 | ...
  timeout: 600 # total plot task timeout (sec) 绘图总超时（秒）
  poll_interval: 5 # result polling interval (sec) 结果轮询间隔（秒）
